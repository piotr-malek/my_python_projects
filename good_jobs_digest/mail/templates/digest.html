<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job digest — {{ date }}</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; line-height: 1.45; color: #1a1a1a; max-width: 720px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 1.35rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.05rem; margin-top: 1.25rem; margin-bottom: 0.35rem; }
    ul { margin: 0.35rem 0 0.75rem; padding-left: 1.15rem; }
    li { margin-bottom: 0.55rem; }
    a { color: #0b57d0; }
    blockquote { border-left: 4px solid #ccc; margin: 0; padding-left: 12px; color: #444; }
  </style>
</head>
<body>
  {{ body_html | safe }}

</html>
