<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physiology Digest {{ date }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 17px;
      line-height: 1.55;
      color: #1a1a1a;
      background: #ffffff;
      margin: 0;
      padding: 20px 18px;
      -webkit-text-size-adjust: 100%;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 16px 0;
      color: #0f0f0f;
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 24px 0 8px 0;
      color: #0f0f0f;
      border-bottom: 1px solid #eaeaea;
      padding-bottom: 4px;
    }
    p { margin: 0 0 12px 0; }
    blockquote {
      margin: 8px 0 16px 0;
      padding: 10px 14px;
      background: #f6f7f8;
      border-left: 3px solid #4a90e2;
      border-radius: 4px;
      color: #2a2a2a;
    }
    ul { margin: 8px 0 16px 0; padding-left: 22px; }
    li { margin: 6px 0; }
    strong { font-weight: 600; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #eaeaea; }
      h1, h2 { color: #ffffff; }
      h2 { border-bottom-color: #333; }
      blockquote { background: #242424; color: #d4d4d4; border-left-color: #4a90e2; }
    }
  </style>
</head>
<body>
{{ body_html }}
</body>
</html>
